<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>POD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@900&display=swap');

:root {
  --bg:    #07091C;
  --green: #00D166;
  --blue:  #1688FF;
  --purp:  #8B5CF6;
  --w:     #FFFFFF;
  --dim:   rgba(255,255,255,.42);
  --faint: rgba(255,255,255,.06);
  --edge:  rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;display:grid;place-items:center;background:#030408;
  font-family:'Inter',ui-sans-serif,system-ui,sans-serif;}
.stage{width:min(100vw,1280px);aspect-ratio:16/9;position:relative;
  overflow:hidden;border-radius:20px;background:var(--bg);
  box-shadow:0 48px 140px rgba(0,0,0,.85);}

/* orbs */
.og,.ob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.og{width:600px;height:600px;background:rgba(0,209,102,.14);top:-150px;right:-120px;animation:of 9s ease-in-out infinite;}
.ob{width:420px;height:420px;background:rgba(22,136,255,.09);bottom:-80px;left:-80px;animation:of 11s ease-in-out infinite reverse;}
@keyframes of{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.08) translateY(28px);}}

/* rings */
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,209,102,.10);
  left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;
  animation:rp 3.5s ease-in-out infinite;}
.r1{width:340px;height:340px;}.r2{width:520px;height:520px;animation-delay:.7s;}.r3{width:720px;height:720px;animation-delay:1.4s;}
@keyframes rp{0%,100%{opacity:.18;transform:translate(-50%,-50%) scale(1);}50%{opacity:.45;transform:translate(-50%,-50%) scale(1.04);}}

/* shared entrance */
@keyframes up{from{opacity:0;transform:translateY(13px);}to{opacity:1;transform:translateY(0);}}
@keyframes blast{from{opacity:0;transform:scale(.78);filter:blur(18px);}to{opacity:1;transform:scale(1);filter:blur(0);}}

/* end card */
.end{position:absolute;inset:0;display:grid;place-items:center;z-index:2;text-align:center;}
.pod-img{width:clamp(260px,36vw,480px);height:auto;border-radius:40px;
  display:block;margin:0 auto 24px;
  opacity:0;animation:blast 1s cubic-bezier(.22,1,.36,1) .3s forwards;}


</style>
</head>
