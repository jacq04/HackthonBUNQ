# Fly.io deployment for TigerBeetle as a private sidecar.
# Reachable from the FastAPI app at  pod-tb.internal:3000
# (Fly's internal 6PN DNS — never exposed to the public internet).
#
# We don't declare a [[services]] block: any port the VM binds on 0.0.0.0
# is reachable from other apps in the same org via the private 6PN network
# without going through Fly's edge proxy. That keeps TB unreachable from
# the public internet by construction.

app = "pod-tb"
primary_region = "ams"

# Format the data file on first boot, then start TB.
[experimental]
  cmd = ["/bin/sh", "-c", "if [ ! -f /data/0_0.tigerbeetle ]; then /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 --development /data/0_0.tigerbeetle; fi; exec /tigerbeetle start --addresses=0.0.0.0:3000 --development /data/0_0.tigerbeetle"]

[mounts]
  source = "tb_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
